<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root {
    --bg: #0d1117;
    --header-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --input-bg: #0d1117;
    --input-border: #30363d;
    --btn-bg: #238636;
    --btn-hover: #2ea043;
    --btn-text: #ffffff;
    --user-bg: #1f6feb;
    --assistant-bg: #161b22;
    --code-bg: #0d1117;
    --add-bg: rgba(46, 160, 67, 0.15);
    --add-border: #238636;
    --add-text: #3fb950;
    --del-bg: rgba(248, 81, 73, 0.15);
    --del-border: #da3633;
    --del-text: #f85149;
    --ln-bg: #161b22;
    --ln-text: #6e7681;
    --radius: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
}
.header-title svg {
    width: 20px;
    height: 20px;
}
.header-actions {
    display: flex;
    gap: 8px;
}
.header-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
}
.header-btn:hover {
    color: var(--text);
    border-color: var(--text-muted);
}

/* Chat container */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Chat messages area */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

#chat::-webkit-scrollbar {
    width: 8px;
}
#chat::-webkit-scrollbar-track {
    background: transparent;
}
#chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
}

/* Messages */
.message {
    max-width: 85%;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.user {
    align-self: flex-end;
    align-items: flex-end;
}
.assistant {
    align-self: flex-start;
    align-items: flex-start;
}

.message-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.user .message-label { justify-content: flex-end; }

.message-content {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    word-wrap: break-word;
}
.user .message-content {
    background: var(--user-bg);
    color: white;
    border-bottom-right-radius: 2px;
}
.assistant .message-content {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
}
.log .message-content {
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 0;
    border: none;
}

/* Developer info panel */
.dev-info {
    background: var(--header-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 8px 0;
}
.dev-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
}
.dev-info-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.dev-info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
}
.dev-info-value {
    font-size: 13px;
    font-weight: 600;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
.dev-info-value.tokens { color: #79c0ff; }
.dev-info-value.cost { color: #7ee787; }
.dev-info-value.time { color: #d2a8ff; }
.dev-info-value.step { color: #ffa657; }

/* File changes */
.file-changes {
    background: var(--header-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 8px 0;
}
.file-changes-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    margin: 4px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
}
.file-item:hover {
    background: var(--input-bg);
}
.file-status {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
}
.file-status.modified { background: #e3b34130; color: #e3b341; }
.file-status.added { background: #23863630; color: #3fb950; }
.file-status.deleted { background: #da363330; color: #f85149; }
.file-path {
    color: var(--text);
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
}
.file-changes-count {
    color: var(--text-muted);
    font-size: 11px;
    margin-left: auto;
}

/* Code blocks */
.code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 8px 0;
    overflow: hidden;
}
.code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
}
.code-lang {
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
}
.code-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
}
.code-copy:hover {
    color: var(--text);
    border-color: var(--text-muted);
}
.code-copy.copied {
    color: #7ee787;
    border-color: #7ee787;
}
pre {
    margin: 0;
    padding: 12px;
    overflow-x: auto;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
}
pre code {
    font-family: inherit;
}

/* Syntax highlighting */
.token-comment { color: #8b949e; }
.token-string { color: #a5d6ff; }
.token-keyword { color: #ff7b72; }
.token-number { color: #79c0ff; }
.token-function { color: #d2a8ff; }
.token-operator { color: #ff7b72; }
.token-punctuation { color: #c9d1d9; }

/* Markdown */
.markdown-content {
    line-height: 1.6;
}
.markdown-content h1 { font-size: 1.4em; margin: 12px 0 8px; font-weight: 600; }
.markdown-content h2 { font-size: 1.25em; margin: 10px 0 6px; font-weight: 600; }
.markdown-content h3 { font-size: 1.1em; margin: 8px 0 4px; font-weight: 600; }
.markdown-content p { margin: 8px 0; }
.markdown-content ul, .markdown-content ol { margin: 8px 0; padding-left: 24px; }
.markdown-content li { margin: 4px 0; }
.markdown-content code:not(pre code) {
    background: rgba(110, 118, 129, 0.2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
.markdown-content strong { font-weight: 600; }
.markdown-content em { font-style: italic; }
.markdown-content a { color: #58a6ff; text-decoration: none; }
.markdown-content a:hover { text-decoration: underline; }

/* Slash command hints */
#hints {
    display: none;
    flex-direction: column;
    background: var(--header-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 0 16px 8px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.hint-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    gap: 12px;
    transition: background 0.15s;
}
.hint-item:hover {
    background: var(--input-bg);
}
.hint-cmd {
    color: #58a6ff;
    font-weight: 600;
    min-width: 70px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}
.hint-desc { color: var(--text-muted); }

/* Input area */
.input-area {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--header-bg);
    flex-shrink: 0;
}
.input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius);
    padding: 8px 12px;
    transition: border-color 0.15s;
}
.input-wrapper:focus-within {
    border-color: #58a6ff;
}
#input {
    flex: 1;
    resize: none;
    background: transparent;
    color: var(--text);
    border: none;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.5;
    min-height: 24px;
    max-height: 120px;
    outline: none;
}
#input::placeholder {
    color: var(--text-muted);
}
.send-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
}
.send-btn:hover {
    background: var(--btn-hover);
}
.send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Loading indicator */
.loading-dots {
    display: inline-flex;
    gap: 4px;
    padding: 8px 0;
}
.loading-dots span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

/* Empty state */
.empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    padding: 40px;
    text-align: center;
}
.empty-state svg {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
}
.empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
}
.empty-state p {
    font-size: 13px;
    max-width: 300px;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Om AI
    </div>
    <div class="header-actions">
        <button class="header-btn" onclick="clearHistory()">Clear Chat</button>
    </div>
</div>

<div class="chat-container">
    <div id="chat">
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <h3>How can I help you?</h3>
            <p>Describe what you want to build or fix, and I'll help you write the code.</p>
        </div>
    </div>

    <div id="hints">
        <div class="hint-item" onclick="fillSlash('/explain')">
            <span class="hint-cmd">/explain</span>
            <span class="hint-desc">Explain selected code</span>
        </div>
        <div class="hint-item" onclick="fillSlash('/fix')">
            <span class="hint-cmd">/fix</span>
            <span class="hint-desc">Fix selected code</span>
        </div>
        <div class="hint-item" onclick="fillSlash('/doc')">
            <span class="hint-cmd">/doc</span>
            <span class="hint-desc">Generate JSDoc</span>
        </div>
        <div class="hint-item" onclick="fillSlash('/test')">
            <span class="hint-cmd">/test</span>
            <span class="hint-desc">Write unit tests</span>
        </div>
        <div class="hint-item" onclick="fillSlash('/commit')">
            <span class="hint-cmd">/commit</span>
            <span class="hint-desc">Generate commit message</span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input" rows="1" placeholder="Ask anything... or type / for commands"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
const vscode = acquireVsCodeApi();
const chat = document.getElementById('chat');
const hints = document.getElementById('hints');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');

// State
const state = vscode.getState() || { messages: [] };

// Render existing messages
if (state.messages.length > 0) {
    emptyState.style.display = 'none';
    state.messages.forEach(function(m) {
        renderMessage(m.text, m.role);
    });
}

// Input handling
input.addEventListener('input', function() {
    // Auto-resize
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    
    // Show hints
    const val = input.value;
    hints.style.display = (val === '/' || (val.startsWith('/') && !val.includes(' '))) ? 'flex' : 'none';
});

input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function fillSlash(cmd) {
    input.value = cmd + ' ';
    hints.style.display = 'none';
    input.focus();
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
}

// Send message
function send() {
    hints.style.display = 'none';
    const text = input.value.trim();
    if (!text) return;

    // Disable button temporarily
    sendBtn.disabled = true;
    
    addMessage(text, 'user');
    vscode.postMessage({ type: 'prompt', text: text });
    
    input.value = '';
    input.style.height = 'auto';
    
    // Re-enable after a short delay
    setTimeout(function() {
        sendBtn.disabled = false;
    }, 500);
}

// Clear history
function clearHistory() {
    chat.innerHTML = '';
    chat.appendChild(emptyState);
    emptyState.style.display = 'flex';
    vscode.setState({ messages: [] });
}

// Add message
function addMessage(text, role) {
    // Hide empty state
    emptyState.style.display = 'none';
    
    renderMessage(text, role);
    
    const s = vscode.getState() || { messages: [] };
    s.messages.push({ text: text, role: role });
    if (s.messages.length > 100) s.messages.shift();
    vscode.setState(s);
}

// Syntax highlighting
function highlightCode(code) {
    var highlighted = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '<')
        .replace(/>/g, '>');
    
    // Comments (single and multi-line)
    highlighted = highlighted.replace(/(\/\/.*$|\/\*[\s\S]*?\*\/)/gm, 
        '<span class="token-comment">$1</span>');
    
    // Strings (double, single, template)
    highlighted = highlighted.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g,
        '<span class="token-string">$1</span>');
    
    // Keywords
    var keywords = ['function', 'const', 'let', 'var', 'return', 'if', 'else', 'for', 'while', 
        'class', 'import', 'export', 'from', 'async', 'await', 'try', 'catch', 'throw', 
        'new', 'this', 'typeof', 'instanceof', 'extends', 'implements', 'interface', 
        'type', 'enum', 'public', 'private', 'protected', 'static', 'readonly',
        'default', 'case', 'switch', 'break', 'continue', 'do', 'finally', 'in', 'of',
        'null', 'undefined', 'true', 'false', 'void', 'yield', 'get', 'set', 'super'];
    keywords.forEach(function(kw) {
        var re = new RegExp('\\b(' + kw + ')\\b', 'g');
        highlighted = highlighted.replace(re, '<span class="token-keyword">$1</span>');
    });
    
    // Numbers
    highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, 
        '<span class="token-number">$1</span>');
    
    // Function names
    highlighted = highlighted.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g,
        '<span class="token-function">$1</span>');
    
    return highlighted;
}

// Markdown rendering
function renderMarkdown(text) {
    var html = text
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/^\d+\. (.*$)/gm, '<li>$1</li>');
    
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    return html;
}

// Parse code blocks
function parseCodeBlocks(text) {
    var codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
    var blocks = [];
    var lastIndex = 0;
    var match;
    
    while ((match = codeBlockRegex.exec(text)) !== null) {
        if (match.index > lastIndex) {
            blocks.push({
                type: 'text',
                content: text.slice(lastIndex, match.index)
            });
        }
        
        blocks.push({
            type: 'code',
            lang: match[1] || 'plaintext',
            content: match[2].trim()
        });
        
        lastIndex = match.index + match[0].length;
    }
    
    if (lastIndex < text.length) {
        blocks.push({
            type: 'text',
            content: text.slice(lastIndex)
        });
    }
    
    return blocks.length > 0 ? blocks : [{ type: 'text', content: text }];
}

// Render message
function renderMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'message ' + role;
    
    // Label
    var label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'You' : 'Om AI';
    div.appendChild(label);
    
    // Content
    var contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    if (role === 'log') {
        contentDiv.textContent = text;
    } else {
        var blocks = parseCodeBlocks(text);
        
        blocks.forEach(function(block) {
            if (block.type === 'code') {
                var codeBlock = document.createElement('div');
                codeBlock.className = 'code-block';
                
                var header = document.createElement('div');
                header.className = 'code-header';
                
                var lang = document.createElement('span');
                lang.className = 'code-lang';
                lang.textContent = block.lang;
                
                var copyBtn = document.createElement('button');
                copyBtn.className = 'code-copy';
                copyBtn.textContent = 'Copy';
                copyBtn.onclick = function() {
                    navigator.clipboard.writeText(block.content);
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(function() {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                };
                
                header.appendChild(lang);
                header.appendChild(copyBtn);
                
                var pre = document.createElement('pre');
                var code = document.createElement('code');
                code.innerHTML = highlightCode(block.content);
                pre.appendChild(code);
                
                codeBlock.appendChild(header);
                codeBlock.appendChild(pre);
                contentDiv.appendChild(codeBlock);
            } else {
                var textDiv = document.createElement('div');
                textDiv.className = 'markdown-content';
                textDiv.innerHTML = renderMarkdown(block.content);
                contentDiv.appendChild(textDiv);
            }
        });
    }
    
    div.appendChild(contentDiv);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Render dev info
function renderDevInfo(info) {
    var div = document.createElement('div');
    div.className = 'message assistant';
    
    var label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Om AI';
    div.appendChild(label);
    
    var contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    var html = '<div class="dev-info"><div class="dev-info-grid">';
    
    if (info.tokens) {
        html += '<div class="dev-info-item">' +
            '<span class="dev-info-label">Tokens</span>' +
            '<span class="dev-info-value tokens">' + info.tokens.prompt.toLocaleString() + ' + ' + info.tokens.completion.toLocaleString() + ' = ' + info.tokens.total.toLocaleString() + '</span>' +
        '</div>';
    }
    
    if (info.cost !== undefined) {
        html += '<div class="dev-info-item">' +
            '<span class="dev-info-label">Cost</span>' +
            '<span class="dev-info-value cost">$' + info.cost.toFixed(6) + '</span>' +
        '</div>';
    }
    
    if (info.time !== undefined) {
        html += '<div class="dev-info-item">' +
            '<span class="dev-info-label">Time</span>' +
            '<span class="dev-info-value time">' + (info.time < 1000 ? info.time + 'ms' : (info.time/1000).toFixed(1) + 's') + '</span>' +
        '</div>';
    }
    
    if (info.step) {
        html += '<div class="dev-info-item">' +
            '<span class="dev-info-label">Step</span>' +
            '<span class="dev-info-value step">' + info.step + '</span>' +
        '</div>';
    }
    
    html += '</div></div>';
    contentDiv.innerHTML = html;
    div.appendChild(contentDiv);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Render file changes
function renderFileChanges(files) {
    var div = document.createElement('div');
    div.className = 'message assistant';
    
    var label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Om AI';
    div.appendChild(label);
    
    var contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    var html = '<div class="file-changes">' +
        '<div class="file-changes-title">📁 Files Changed</div>';
    
    files.forEach(function(file) {
        var changesCount = file.changes ? '<span class="file-changes-count">+' + file.changes + '</span>' : '';
        html += '<div class="file-item" data-path="' + file.path + '">' +
            '<span class="file-status ' + file.status + '">' + file.status + '</span>' +
            '<span class="file-path">' + file.path + '</span>' +
            changesCount +
        '</div>';
    });
    
    html += '</div>';
    contentDiv.innerHTML = html;
    div.appendChild(contentDiv);
    
    // Add click handlers
    contentDiv.querySelectorAll('.file-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var path = this.getAttribute('data-path');
            vscode.postMessage({ type: 'openFile', path: path });
        });
    });
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Render diff snippet
function renderDiffSnippet(snippet) {
    var div = document.createElement('div');
    div.className = 'message assistant';
    
    var label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Om AI';
    div.appendChild(label);
    
    var contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    var html = '<div class="code-block">' +
        '<div class="code-header">' +
            '<span class="code-lang">' + snippet.path + '</span>' +
        '</div>' +
        '<pre style="margin:0;padding:12px;overflow-x:auto;"><code>';
    
    var maxLines = Math.max(snippet.oldLines.length, snippet.newLines.length);
    for (var i = 0; i < maxLines; i++) {
        var oldLine = snippet.oldLines[i];
        var newLine = snippet.newLines[i];
        
        if (oldLine && !newLine) {
            html += '<span style="color: #f85149;background: rgba(248,81,73,0.15);display:block;">- ' + escapeHtml(oldLine) + '</span>\n';
        } else if (!oldLine && newLine) {
            html += '<span style="color: #3fb950;background: rgba(46,160,67,0.15);display:block;">+ ' + escapeHtml(newLine) + '</span>\n';
        } else if (oldLine !== newLine) {
            html += '<span style="color: #f85149;display:block;">- ' + escapeHtml(oldLine) + '</span>\n';
            html += '<span style="color: #3fb950;display:block;">+ ' + escapeHtml(newLine) + '</span>\n';
        } else {
            html += '<span style="display:block;">  ' + escapeHtml(oldLine) + '</span>\n';
        }
    }
    
    html += '</code></pre></div>';
    contentDiv.innerHTML = html;
    div.appendChild(contentDiv);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '<')
        .replace(/>/g, '>');
}

// Message handler
window.addEventListener('message', function(event) {
    var msg = event.data;
    
    if (msg.type === 'assistant') {
        addMessage(msg.text, 'assistant');
    } else if (msg.type === 'log') {
        addMessage(msg.text, 'log');
    } else if (msg.type === 'devInfo') {
        renderDevInfo(msg.info);
    } else if (msg.type === 'fileChanges') {
        renderFileChanges(msg.files);
    } else if (msg.type === 'diffSnippet') {
        renderDiffSnippet(msg.snippet);
    }
});
</script>
